{% extends "admin/base_admin.html" %}
{% block title %}Add User – Admin{% endblock %}

{% block admin_content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 style="font-family:'Barlow Condensed',sans-serif;color:var(--lime);letter-spacing:2px">
        <i class="bi bi-person-plus me-3"></i>Add User
    </h2>
    <a href="{{ url_for('admin.users') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-2"></i>Back
    </a>
</div>

<div class="card" style="max-width:500px">
    <div class="card-body p-4">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Username *</label>
                <input type="text" name="username" class="form-control" required placeholder="e.g. captain_eagles">
            </div>
            <div class="mb-3">
                <label class="form-label">Password *</label>
                <input type="password" name="password" class="form-control" required placeholder="Minimum 6 characters">
            </div>
            <div class="mb-3">
                <label class="form-label">Role *</label>
                <select name="role" class="form-select" id="roleSelect" onchange="toggleTeam(this.value)">
                    <option value="captain">Captain</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div class="mb-4" id="teamField">
                <label class="form-label">Assign to Team</label>
                <select name="team_id" class="form-select">
                    <option value="">-- No Team --</option>
                    {% for team in teams %}
                    <option value="{{ team.id }}">{{ team.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-primary px-5">
                <i class="bi bi-check-circle me-2"></i>Create User
            </button>
        </form>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
function toggleTeam(role) {
    document.getElementById('teamField').style.display = role === 'admin' ? 'none' : 'block';
}
</script>
{% endblock %}
